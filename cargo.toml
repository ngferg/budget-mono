[workspace]
resolver = "3"
members = ["budget-lib", "budget-rest"]

[workspace.dependencies]
axum = "0.8.6"
chrono = "0.4.42"
rusqlite = "0.37.0"
serde = { version = "1.0.228", features = ["serde_derive", "derive"] }
serde_json = "1.0.145"
sha256 = "1.6.0"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["full"] }
budget_lib = { path = "./budget-lib" }

